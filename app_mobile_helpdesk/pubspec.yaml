name: app_mobile_helpdesk
description: App móvil para sistema HelpDesk
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # =========================
  # Networking
  # =========================
  dio: ^5.9.2
  pretty_dio_logger: ^1.3.1

  # =========================
  # Manejo de estado
  # =========================
  provider: ^6.1.5+1

  # =========================
  # Seguridad / almacenamiento
  # =========================
  flutter_secure_storage: ^9.2.2

  # =========================
  # Navegación
  # =========================
  go_router: ^14.2.0

  # =========================
  # Imágenes
  # =========================
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

  # =========================
  # UI / Loading
  # =========================
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0
  get_it: ^9.2.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/fondo1.png